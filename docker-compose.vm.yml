# Overlay для выкладки на VM (Yandex Cloud и др.)
# Запуск: docker compose -f docker-compose.yml -f docker-compose.vm.yml up -d --build

services:
  db:
    ports: []  # не публикуем Postgres наружу

  redis:
    ports: []  # не публикуем Redis наружу

  web:
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DEBUG: "0"
    volumes:
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    ports: []  # доступ только через nginx
    restart: unless-stopped

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  staticfiles_data:
