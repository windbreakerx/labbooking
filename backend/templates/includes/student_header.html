{% load static %}
<header class="header header--student">
    <div class="container student-header-row">
        <a href="{% url 'home' %}" class="header__brand logo">
            <img src="{% static 'img/spmi-logo.png' %}" alt="" class="header__brand-logo" width="40" height="40">
            <span class="header__brand-text">
                <span class="header__brand-title">Лабораторные</span>
                <span class="header__brand-subtitle">Горный университет</span>
            </span>
        </a>

        <nav class="student-top-nav" aria-label="Основная навигация">
        <a
            class="pill-nav__link{% if request.resolver_match.url_name == 'home' %} pill-nav__link--current{% endif %}"
            href="{% url 'home' %}"
            hx-boost="true"
        >Главная</a>
        <a
            class="pill-nav__link{% if request.resolver_match.url_name == 'disciplines' or request.resolver_match.url_name == 'lab-works' or request.resolver_match.url_name == 'book-lab-work' %} pill-nav__link--current{% endif %}"
            href="{% url 'disciplines' %}"
            hx-boost="true"
        >Дисциплины</a>
        <a
            class="pill-nav__link{% if request.resolver_match.url_name == 'student-rooms' %} pill-nav__link--current{% endif %}"
            href="{% url 'student-rooms' %}"
            hx-boost="true"
        >Аудитории</a>
        <a
            class="pill-nav__link{% if request.resolver_match.url_name == 'my-bookings' or request.resolver_match.url_name == 'booking-detail' %} pill-nav__link--current{% endif %}"
            href="{% url 'my-bookings' %}"
            hx-boost="true"
        >Мои записи</a>
        <a
            class="pill-nav__link{% if request.resolver_match.url_name == 'support' or request.resolver_match.url_name == 'support-detail' %} pill-nav__link--current{% endif %}"
            href="{% url 'support' %}"
            hx-boost="true"
        >Обращения</a>
        </nav>

        <div class="student-header-tools">
            <div class="student-user-chip">
                <span class="student-user-chip__name">{% if user.full_name %}{{ user.full_name }}{% else %}{{ user.email }}{% endif %}</span>
                <span class="student-user-chip__cabinet">Кабинет</span>
            </div>
            <form method="post" action="{% url 'logout' %}" class="student-user-logout">
                {% csrf_token %}
                <button type="submit" class="student-logout-link">Выход</button>
            </form>
        </div>
    </div>
</header>
