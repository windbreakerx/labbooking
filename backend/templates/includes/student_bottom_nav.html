<nav class="student-bottom-nav" aria-label="Навигация">
    <a
        class="student-bottom-nav__item{% if request.resolver_match.url_name == 'home' %} student-bottom-nav__item--current{% endif %}"
        href="{% url 'home' %}"
        hx-boost="true"
    >
        <span class="student-bottom-nav__icon" aria-hidden="true">⌂</span>
        <span class="student-bottom-nav__label">Главная</span>
    </a>
    <a
        class="student-bottom-nav__item{% if request.resolver_match.url_name == 'disciplines' or request.resolver_match.url_name == 'lab-works' or request.resolver_match.url_name == 'book-lab-work' %} student-bottom-nav__item--current{% endif %}"
        href="{% url 'disciplines' %}"
        hx-boost="true"
    >
        <span class="student-bottom-nav__icon" aria-hidden="true">≡</span>
        <span class="student-bottom-nav__label">Дисциплины</span>
    </a>
    <a
        class="student-bottom-nav__item{% if request.resolver_match.url_name == 'my-bookings' or request.resolver_match.url_name == 'booking-detail' %} student-bottom-nav__item--current{% endif %}"
        href="{% url 'my-bookings' %}"
        hx-boost="true"
    >
        <span class="student-bottom-nav__icon" aria-hidden="true">◷</span>
        <span class="student-bottom-nav__label">Записи</span>
    </a>
    <a
        class="student-bottom-nav__item{% if request.resolver_match.url_name == 'support' or request.resolver_match.url_name == 'support-detail' %} student-bottom-nav__item--current{% endif %}"
        href="{% url 'support' %}"
        hx-boost="true"
    >
        <span class="student-bottom-nav__icon" aria-hidden="true">?</span>
        <span class="student-bottom-nav__label">Помощь</span>
    </a>
</nav>
