{% extends "base.html" %}
{% block title %}Учебные дисциплины{% endblock %}
{% block content %}
<h1>Учебные дисциплины</h1>
<table class="table">
    <thead>
        <tr><th>Дисциплина</th><th></th></tr>
    </thead>
    <tbody>
        {% for d in disciplines %}
        <tr>
            <td>{{ d.title }}</td>
            <td><a href="{% url 'lab-works' d.pk %}">Лабораторные работы</a></td>
        </tr>
        {% empty %}
        <tr><td colspan="2">Нет доступных дисциплин.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
