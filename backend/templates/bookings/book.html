{% extends "base.html" %}
{% block title %}Запись — {{ lab_work.title }}{% endblock %}
{% block content %}
<h1>Запись на {{ lab_work.title }}</h1>
<p class="muted">{{ lab_work.discipline.title }}</p>

<form method="post" id="booking-form">
    {% csrf_token %}
    <div id="filter-chain">
        <label>Дата
            <select name="date"
                    hx-get="{% url 'book-filter' lab_work.pk %}"
                    hx-target="#filter-chain"
                    hx-swap="innerHTML"
                    hx-include="#filter-chain">
                <option value="">—</option>
                {% for opt in filter_options %}
                <option value="{{ opt.value }}">{{ opt.label }}</option>
                {% endfor %}
            </select>
        </label>
    </div>
    <div id="session-slot"></div>
    <button type="submit" id="book-btn" disabled>Записаться</button>
</form>
<script>
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'session-slot') {
        const sel = document.querySelector('#session-slot select[name=session_id]');
        const btn = document.getElementById('book-btn');
        if (sel) {
            btn.disabled = !sel.value;
            sel.addEventListener('change', () => { btn.disabled = !sel.value; });
        }
    }
});
</script>
{% endblock %}
