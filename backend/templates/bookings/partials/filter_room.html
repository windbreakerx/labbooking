<label class="sr-only">Дата
    <input type="hidden" name="date" value="{{ date }}">
</label>
<label class="sr-only">Время
    <input type="hidden" name="time" value="{{ time }}">
</label>
<section class="booking-step-panel">
    <div class="booking-step-panel__header">
        <span class="badge badge--muted booking-step-badge">Шаг 3</span>
    </div>
    <p class="selected-value"><span>Время</span> {{ time }}</p>
    <label>Аудитория
        <select name="room"
                class="booking-select"
                hx-get="{% url filter_route|default:'book-filter' lab_work_id %}"
                hx-target="{{ session_slot_selector|default:'#session-slot' }}"
                hx-swap="innerHTML"
                hx-include="{{ filter_chain_selector|default:'#filter-chain' }}">
            <option value="">—</option>
            {% for opt in options %}
            <option value="{{ opt.value }}">{{ opt.label }}</option>
            {% endfor %}
        </select>
    </label>
    <p class="muted booking-step-panel__hint">После выбора аудитории появится подтверждение доступного слота.</p>
</section>
