<input type="hidden" name="date" value="{{ date }}">
<section class="booking-step-panel">
    <div class="booking-step-panel__header">
        <span class="badge badge--muted booking-step-badge">Шаг 2</span>
        <button type="button"
                class="btn-link"
                hx-get="{% url filter_route|default:'book-filter' lab_work_id %}"
                hx-target="{{ filter_chain_selector|default:'#filter-chain' }}"
                hx-swap="innerHTML"
                hx-indicator=".htmx-booking-indicator">← Выбрать другой день</button>
    </div>
    <p class="selected-value"><span>Выбранный день</span> {{ date }}</p>
    <label>Интервал времени
        <select name="time"
                class="booking-select"
                hx-get="{% url filter_route|default:'book-filter' lab_work_id %}"
                hx-target="{{ session_slot_selector|default:'#session-slot' }}"
                hx-swap="innerHTML"
                hx-include="{{ filter_chain_selector|default:'#filter-chain' }}"
                hx-indicator=".htmx-booking-indicator">
            <option value="">—</option>
            {% for opt in options %}
            <option value="{{ opt.value }}">{{ opt.label }}</option>
            {% endfor %}
        </select>
    </label>
    <p class="muted booking-step-panel__hint">После выбора интервала система покажет доступные учебные центры или слоты.</p>
</section>
