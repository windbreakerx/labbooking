<label class="sr-only">Дата
    <input type="hidden" name="date" value="{{ date }}">
</label>
<label class="sr-only">Время
    <input type="hidden" name="time" value="{{ time }}">
</label>
<section class="booking-step-panel">
    <p class="selected-value"><span>Время</span> {{ time }}</p>
    <label>Учебный центр
        <select name="tc"
                class="booking-select"
                hx-get="{% url 'book-filter' lab_work_id %}"
                hx-target="#filter-chain"
                hx-swap="innerHTML"
                hx-include="#filter-chain">
            <option value="">—</option>
            {% for opt in options %}
            <option value="{{ opt.value }}">{{ opt.label }}</option>
            {% endfor %}
        </select>
    </label>
    <p class="muted">Выберите учебный центр, чтобы уточнить доступные аудитории.</p>
</section>
